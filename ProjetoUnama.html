<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle Financeiro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #FFFFFF;
    }

    .hero {
      background: linear-gradient(135deg, #6C3BFF, #4B1FD1);
      color: white;
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 2.5em;
    }

    .hero p {
      font-size: 1.2em;
      margin: 20px 0;
    }

    .btn {
      background: white;
      color: #6C3BFF;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin: 10px;
    }

    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #F5F5F5;
      padding: 20px;
      border-radius: 12px;
      width: 250px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Controle seu dinheiro sem parar de viver</h1>
    <p>Organize seus gastos, divida contas e aprenda a economizar</p>
    <button class="btn">Começar agora</button>
    <button class="btn">Ver como funciona</button>
  </div>

  <div class="section">
    <h2>Você tem esses problemas?</h2>
    <div class="cards">
      <div class="card">Gastos descontrolados</div>
      <div class="card">Dificuldade de dividir contas</div>
      <div class="card">Falta de planejamento</div>
    </div>
  </div>

  <div class="section">
    <h2>Como podemos te ajudar</h2>
    <div class="cards">
      <div class="card">Controle de gastos</div>
      <div class="card">Divisão de contas</div>
      <div class="card">Educação financeira</div>
    </div>
  </div>

</body>
</html>
