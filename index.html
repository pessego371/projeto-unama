<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle Financeiro</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #FFFFFF;
    }

    .hero {
      background: linear-gradient(135deg, #6C3BFF, #4B1FD1);
      color: white;
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 2.2em;
    }

    .hero p {
      margin: 20px 0;
      font-size: 1.1em;
    }

    .btn {
      background: white;
      color: #6C3BFF;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
      font-weight: bold;
    }

    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: #F5F5F5;
      padding: 20px;
      border-radius: 10px;
      width: 220px;
    }

    @media (max-width: 600px) {
      .hero h1 {
        font-size: 1.6em;
      }

      .card {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Controle seu dinheiro sem parar de viver</h1>
    <p>Organize seus gastos, divida contas e aprenda a economizar</p>
    <button class="btn">Começar agora</button>
    <button class="btn">Ver como funciona</button>
  </div>

  <div class="section">
    <h2>Você tem esses problemas?</h2>

    <div class="cards">
      <div class="card">Gastos descontrolados</div>
      <div class="card">Dificuldade de dividir contas</div>
      <div class="card">Falta de planejamento</div>
    </div>
  </div>

  <div class="section">
    <h2>Como podemos te ajudar</h2>

    <div class="cards">
      <div class="card">Controle de gastos</div>
      <div class="card">Divisão de contas</div>
      <div class="card">Educação financeira</div>
    </div>
  </div>

</body>
</html>
